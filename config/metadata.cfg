# =============================================================================
# Riyadh Air – Contract Analyzer configuration
# Edit this file to tune extraction behavior without changing Python code.
# Lines starting with # are comments. Format: key = comma-separated values
# =============================================================================

# ---------------------------------------------------------------------------
# PARTY DETECTION
# ---------------------------------------------------------------------------
# Terms that identify the supplier / vendor role in the contract
supplier_role_terms = supplier,vendor,seller,contractor,service provider,provider,licensor

# Terms that identify the buyer / client role
buyer_role_terms = buyer,client,purchaser,licensee

# Legal-entity suffixes used to validate that extracted names are real companies
legal_entity_markers = llc,l.l.c,ltd,limited,inc,corp,corporation,company,plc,llp,lp,pte,pvt,gmbh,pjsc,fzco,fze,ag,nv,bv

# Phrases that should truncate / discard a candidate entity name
entity_stop_phrases = this agreement,agreement is made,collectively,effective date,hereinafter,witnesseth,shall

# ---------------------------------------------------------------------------
# CONTRACT METADATA FIELDS
# ---------------------------------------------------------------------------
# Regex hint keywords used by the parser for each metadata field.
# The parser searches for these terms to locate the relevant value.

# Contract Classification
field.primary_type.keywords = service agreement,consulting agreement,supply agreement,software,saas,license agreement,fuel supply,goods

field.sub_type.keywords = advisory,operational,subscription,maintenance,procurement,leasing

# Contract Details
field.title.keywords = agreement,contract,master service agreement,statement of work,framework agreement

field.effective_date.keywords = effective date,commencement date,start date,dated as of,entered into

field.term_duration.keywords = term,duration,period of,months,years

field.renewal_provisions.keywords = renewal,auto-renew,auto renew,extend,extension

field.estimated_value.keywords = total value,contract value,estimated value,aggregate,consideration,not to exceed

field.payment_currency.keywords = usd,eur,gbp,aed,sar,qar,kwd,omr,bhd,inr,currency

field.language.keywords = english,arabic,language of the agreement

field.expiration_date.keywords = expiration date,expiry date,end date,termination date

# Parties – Buyer / Client
field.buyer_name.keywords = buyer,client,purchaser,licensee,between,by and between

field.buyer_role.keywords = buyer,client,purchaser,licensee

field.buyer_registered_address.keywords = registered office,registered address,principal place of business,address

field.buyer_party_jurisdiction.keywords = incorporated in,organized under,laws of,jurisdiction

# Parties – Supplier / Vendor
field.supplier_name.keywords = supplier,vendor,seller,contractor,service provider,provider,licensor,between,by and between

field.supplier_role.keywords = supplier,vendor,seller,contractor,service provider,provider,licensor

field.supplier_registered_address.keywords = registered office,registered address,principal place of business,address

field.supplier_party_jurisdiction.keywords = incorporated in,organized under,laws of,jurisdiction

# Jurisdictions
field.supplier_jurisdiction.keywords = supplier jurisdiction,vendor jurisdiction,incorporated,organized under

field.buyer_jurisdiction.keywords = buyer jurisdiction,client jurisdiction,purchaser jurisdiction

field.service_delivery_locations.keywords = place of supply,service location,performed at,delivery location,delivered in

# Nature of Supply
field.description.keywords = scope of services,nature of supply,services description,work description

field.verbatim_scope.keywords = scope of services,statement of work,deliverables,scope of work

field.scope_section_reference.keywords = section,article,clause,schedule,annex,exhibit

# ---------------------------------------------------------------------------
# CONTRACT CLAUSES
# Keywords that the parser uses to locate each clause in the contract text.
# Format: clause.<CODE>.keywords = comma-separated search terms
# ---------------------------------------------------------------------------

# Tax-related clauses
clause.TAX001.title = Tax definitions
clause.TAX001.keywords = tax means,taxes means,definition of tax,tax definition

clause.TAX002.title = Tax clause / tax provisions
clause.TAX002.keywords = tax,taxation,fiscal

clause.TAX003.title = Withholding tax provisions
clause.TAX003.keywords = withholding tax,withhold,deduct tax

clause.TAX004.title = VAT/GST provisions
clause.TAX004.keywords = vat,gst,value added tax,goods and services tax

clause.TAX005.title = Gross-up clause
clause.TAX005.keywords = gross-up,gross up,net of tax

clause.TAX006.title = Tax indemnification provisions
clause.TAX006.keywords = tax indemn,indemnify,tax liability

clause.TAX007.title = Tax representations and warranties
clause.TAX007.keywords = representation,warranty,tax compliance,tax status

clause.TAX008.title = Tax residency certificate obligations
clause.TAX008.keywords = tax residency certificate,residency certificate,certificate of residence

# Payment clauses
clause.PAY001.title = Payment terms and fee structure
clause.PAY001.keywords = payment terms,fees,consideration,price

clause.PAY002.title = Payment currency and exchange rate provisions
clause.PAY002.keywords = currency,exchange rate,conversion,usd,eur,aed

clause.PAY003.title = Invoicing requirements
clause.PAY003.keywords = invoice,billing,tax invoice,invoicing

# Service-related clauses
clause.SVC001.title = Scope of services / nature of supply (full description)
clause.SVC001.keywords = scope of services,services,statement of work,deliverables,scope

clause.SVC002.title = Service delivery location / place of supply
clause.SVC002.keywords = place of supply,service location,performed at,delivery location

clause.SVC003.title = Personnel deployment / secondment provisions
clause.SVC003.keywords = personnel,secondment,staff,employees,resources

clause.SVC004.title = Subcontracting provisions
clause.SVC004.keywords = subcontract,sub-contractor,outsource

# Intellectual Property
clause.IP001.title = Intellectual property / licensing terms
clause.IP001.keywords = intellectual property,ip rights,license,licence,ownership

clause.IP002.title = Royalty provisions
clause.IP002.keywords = royalty,royalties

clause.IP003.title = Software licence grant terms
clause.IP003.keywords = software license,software licence,license grant,licence grant,saas

# Governing and dispute
clause.GOV001.title = Governing law and jurisdiction
clause.GOV001.keywords = governing law,jurisdiction,laws of,courts of

clause.GOV002.title = Dispute resolution
clause.GOV002.keywords = dispute,arbitration,conciliation,mediation,tribunal

# Goods-related clauses
clause.GDS001.title = Delivery terms / Incoterms (for goods contracts)
clause.GDS001.keywords = incoterms,delivery terms,fob,cif,ddp,shipment

clause.GDS002.title = Title transfer provisions (for goods contracts)
clause.GDS002.keywords = title passes,transfer of title,risk of loss,ownership transfer

# General clauses
clause.GEN001.title = Indemnification (general, including tax-related)
clause.GEN001.keywords = indemn,hold harmless,defend

clause.GEN002.title = Limitation of liability
clause.GEN002.keywords = limitation of liability,liability cap,consequential damages

clause.GEN003.title = Confidentiality (if tax-relevant)
clause.GEN003.keywords = confidentiality,confidential information,non-disclosure

clause.GEN004.title = Term, termination, and renewal provisions
clause.GEN004.keywords = term,termination,renewal,expiry,expiration

clause.GEN005.title = Treaty references
clause.GEN005.keywords = treaty,double taxation,tax treaty,dtaa,multilateral

# ---------------------------------------------------------------------------
# EXTRACTION POLICY
# ---------------------------------------------------------------------------
# Extract contract metadata and clauses strictly from contract text.
# Supplier/Vendor and Buyer/Client must be legal entities (company names), not narrative phrases.
# If a value cannot be found, return NOT FOUND IN CONTRACT.
