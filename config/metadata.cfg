# =============================================================================
# Riyadh Air – Contract Analyzer configuration
# Edit this file to tune extraction behavior without changing Python code.
# Lines starting with # are comments. Format: key = comma-separated values
# =============================================================================

# ---------------------------------------------------------------------------
# PARTY DETECTION
# ---------------------------------------------------------------------------
# Terms that identify the supplier / vendor role in the contract
supplier_role_terms = supplier,vendor,seller,contractor,service provider,provider,licensor

# Terms that identify the buyer / client role
buyer_role_terms = buyer,client,purchaser,licensee

# Legal-entity suffixes used to validate that extracted names are real companies
legal_entity_markers = llc,l.l.c,ltd,limited,inc,corp,corporation,company,plc,llp,lp,pte,pvt,gmbh,pjsc,fzco,fze,ag,nv,bv

# Phrases that should truncate / discard a candidate entity name
entity_stop_phrases = this agreement,agreement is made,collectively,effective date,hereinafter,witnesseth,shall

# ---------------------------------------------------------------------------
# CONTRACT METADATA FIELDS
# ---------------------------------------------------------------------------
# Regex hint keywords used by the parser for each metadata field.
# The parser searches for these terms to locate the relevant value.

# Contract Classification
field.primary_type.keywords = High-level classification of the contract based on the overall nature of what is supplied or performed under the agreement, such as advisory services, operational services, goods supply, fuel supply, digital or software services, or a mix of goods and services. What information in the contract describes the main goods, services, software, or other deliverables provided under the agreement?. Examples: Services-Advisory, Services-Operational, Goods, Fuel Supply, Digital, Mixed

field.sub_type.keywords = Specific description of the goods or services provided under the contract, indicating the detailed nature of the arrangement such as legal consulting, ground handling, maintenance services, software licence, cloud services, fuel supply, or other specific operational, advisory, digital, or goods-related category stated in the agreement. What information in the contract specifies the more detailed subtype of the arrangement (for example legal consulting, ground handling, software licence or similar) to describe the Sub Type - specific description? Examples: Legal Consulting, Ground Handling, Aircraft Maintenance, Fuel Supply, Software Licence, Cloud Services, Catering Services

# Contract Details
field.title.keywords = agreement,contract,master service agreement,statement of work,framework agreement. Formal title of the contract as it appears in the document. What text in the document states the formal name or heading of the agreement so the Contract Title can be extracted?. Examples: Rain Delay, Weld Pipe, Flag for Traffic

field.effective_date.keywords = effective date,commencement date,start date,dated as of,entered into. Extract the date when the services start or are provided from. Look for phrases such as 'services from [date]', 'provided from [date]', 'effective date', or 'commencement date'. If the contract states that services shall be provided from a specific date, extract that date. If only a signing date such as 'made on [date]' exists, extract it. If no date exists return NOT FOUND IN CONTRACT. services from date contract start effective date commencement services from. Examples: 13-04-2025, 1 December 2023, November 22 2023, 08/12/2024

field.term_duration.keywords = term,duration,period of,months,years. Extract the duration of the Initial Term. Look for phrases: 'for a period of [X]', 'continue for [X] years', '[X] years (Initial Term)', 'will continue for a period of'. Return only the duration such as '1 year' or '2 years'. Never return empty string. If no duration found → NOT FOUND IN CONTRACT.commences continues for a period of years Initial Term commencement duration. Examples: 1 year, 2 years, 12 months, Initial Term of 2 years

field.renewal_provisions.keywords = renewal,auto-renew,auto renew,extend,extension. Summary of how the contract renews or extends, including automatic renewal terms or notice requirements; if no renewal terms are specified this field must contain the value NOT FOUND IN CONTRACT. Where in the contract are the renewal or extension terms described, including automatic renewal or notice periods, or the absence of such provisions, so the Renewal Provisions can be summarized or marked as NOT FOUND IN CONTRACT?. Examples: Auto-renews annually unless 30 days notice given

field.estimated_value.keywords = total value,contract value,estimated value,aggregate,consideration,not to exceed. Estimated total contract value with currency. Infer if not explicit: (1) If a total or maximum value is stated → extract it. (2) If only rate cards or unit prices exist with no stated total → NOT FOUND IN CONTRACT. (3) If fixed fees or milestones can be summed → extract total. IMPORTANT: Never leave blank. Always return a value or NOT FOUND IN CONTRACT. What information in the contract indicates the estimated total value of the agreement, including amount and currency, or states that no total value is specified, so the Estimated Value can be captured or marked as NOT FOUND IN CONTRACT?. Examples: 300, 500.60, 1000, $100, 50€, 1000 SAR, 10 USD, 20 EUR

field.payment_currency.keywords = usd,eur,gbp,aed,sar,qar,kwd,omr,bhd,inr,currency. Currency for payments under the contract. Infer if not explicit: (1) If a Schedule of Charges, rate table or fee schedule includes a currency code (SAR, USD, EUR) → extract primary currency. (2) If multiple currencies appear (e.g. USD and SAR in same schedule) → extract the one used for contract payments. (3) If amounts reference a symbol ($,€,﷼) or name (Saudi Riyal, US Dollar) → identify it. IMPORTANT: Never leave blank. Always return a value or NOT FOUND IN CONTRACT. Where in the contract, including in Schedule of Charges, rate tables, fee schedules, or Content Development Services sections, is the payment currency defined or implied through currency codes (SAR, USD, EUR) or symbols, so the Payment Currency can be extracted or marked as NOT FOUND IN CONTRACT?. Examples: SAR, USD, EUR

field.language.keywords = english,arabic,language of the agreement. Language in which the contract is drafted, typically English, Arabic, or another language explicitly indicated in the agreement. What information in the contract indicates the governing or drafting language of the agreement, such as English, Arabic, or another language, so the Contract Language can be identified?. Examples: English, Arabic, Spanish

field.expiration_date.keywords = expiration date,expiry date,end date,termination date. Extract the date the contract expires or ends. Priority order: (1) If an explicit expiration or end date is stated → extract it. (2) If no explicit date but Effective Date and Term Duration are both present → calculate by adding duration to Effective Date. (3) References to 'expiration of the then-current term' in renewal or confidentiality clauses alone are not a date → apply rule (2). Never return empty string. If no date and insufficient data to calculate → NOT FOUND IN CONTRACT. What is The Expiration Date?. It may be possible that if it is not present in the document can be calculated considering effective date and the duration of the contract. Examples: 2023-09-23, 09-03-2021, 08/12/2024, January 2016, 04.08.2022, 22 05 1987,1/21/22, 2/22/23, 3/23/24, 07 October 2016. 

# Parties – Buyer / Client
field.buyer_name.keywords = between,by and between,party,parties,hereinafter. Full legal entity name of the Buyer or Client exactly as stated in the contract. What is the legal entity name of the Buyer or Client as stated in the contract? Examples: AVIATION SERVICES COMPANY; Vodafone España S.A.; Airbus SAS; Banco Santander S.A.

field.buyer_role.keywords = buyer,client,purchaser,licensee. Role of the Buyer or Client party in the agreement. Values: 'Buyer/Client', 'Supplier/Vendor', or 'Other'. Infer if not explicit: (1) If counterpart is labeled Supplier/Vendor/Service Provider → classify as 'Buyer/Client'. (2) If described as Client/Customer/Purchaser/Principal → 'Buyer/Client'. (3) If this party receives services or goods → 'Buyer/Client'. Otherwise → 'Other'. What role does the Buyer entity have in the contract (Buyer/Client, Supplier/Vendor, or Other)?. 2 Options: Buyer/Client

field.buyer_registered_address.keywords = registered office,registered address,principal place of business,address. Registered or principal business address of the Buyer or Client as stated in the contract. If no address is provided the value must be NOT FOUND IN CONTRACT. What is the registered or principal address of the Buyer or Client as stated in the contract?. General Authority of Civil Aviation, Building 4075, P.O. Box 8427, Riyadh 13443, Kingdom of Saudi Arabia; NOT FOUND IN CONTRACT

field.buyer_party_jurisdiction.keywords = incorporated in,organized under,laws of,jurisdiction. Country or region associated with the Buyer or Client, typically the place of incorporation or registration. What country or region is associated with the Buyer or Client, such as the place of incorporation or registration?. Countries, Cities, States. Examples: Kingdom of Saudi Arabia; Spain; United States; France

# Parties – Supplier / Vendor
field.supplier_name.keywords = between,by and between,party,parties,hereinafter. Full legal entity name of the Supplier or Vendor exactly as stated in the contract. What is the legal entity name of the Supplier or Vendor as stated in the contract? Examples: AVIATION SERVICES COMPANY; Vodafone España S.A.; Airbus SAS; Banco Santander S.A.

field.supplier_role.keywords = supplier,vendor,seller,contractor,service provider,provider,licensor. Role of the Supplier or Vendor party in the agreement. Values: 'Buyer/Client', 'Supplier/Vendor', or 'Other'. Infer if not explicit: (1) If counterpart is labeled Buyer/Client/Purchaser → classify as 'Supplier/Vendor'. (2) If described as Supplier/Vendor/Service Provider/Contractor → 'Supplier/Vendor'. (3) If this party provides services or goods → 'Supplier/Vendor'. Otherwise → 'Other'. What role does the Supplier entity have in the contract (Buyer/Client, Supplier/Vendor, or Other)?. 2 Options: Supplier/Vendor

field.supplier_registered_address.keywords = registered office,registered address,principal place of business,address. Registered or principal business address of the Supplier or Vendor as stated in the contract. If no address is provided the value must be NOT FOUND IN CONTRACT. What is the registered or principal address of the Supplier or Vendor as stated in the contract?. Examples: 123 Business Park, Suite 400, London EC2A 1NT, United Kingdom; NOT FOUND IN CONTRACT

field.supplier_party_jurisdiction.keywords = incorporated in,organized under,laws of,jurisdiction. Country or region associated with the Supplier or Vendor, typically the place of incorporation or registration. What country or region is associated with the Supplier or Vendor, such as the place of incorporation or registration?. Countries, Cities, States. Examples: United Kingdom; Germany; United States; Singapore

# Jurisdictions
field.supplier_jurisdiction.keywords = supplier jurisdiction,vendor jurisdiction,incorporated,organized under. Country or region that is the primary jurisdiction of the supplier as stated in the contract. What information in the contract indicates the country or region that is the main jurisdiction of the supplier so that Supplier Jurisdiction can be extracted?. Examples: Los Angeles, Grenoble, Barcelona, IL, NY, CA, Indonesia, Europe, Madrid, Italy

field.buyer_jurisdiction.keywords = buyer jurisdiction,client jurisdiction,purchaser jurisdiction. Country or region that is the primary jurisdiction of the buyer or client as specified in the contract. What information in the contract indicates the country or region that is the main jurisdiction of the buyer or client so that Buyer Jurisdiction can be extracted?. Examples: Los Angeles, Grenoble, Barcelona, IL, NY, CA, Indonesia, Europe, Madrid, Italy

field.service_delivery_locations.keywords = place of supply,service location,performed at,delivery location,delivered in. List of locations where the services are delivered or the goods are supplied, as described in the contract. Where in the contract are the places where services are performed or goods are delivered described so the Service Delivery Locations can be listed?. Examples: Sahara Desert, Mount Everest, Amazon River

# Nature of Supply
field.description.keywords = scope of services,nature of supply,services description,work description. Plain language summary of what is being purchased or provided. Search in Background or Recitals section first, then opening clauses. Summarize in 1-3 sentences using plain business language, avoiding legal jargon.What is the Description of the supply?. Learning and media services including eLearning development and consulting. Legal services as requested by the buyer.

field.verbatim_scope.keywords = scope of services,statement of work,deliverables,scope of work. xact text from the contract describing the scope of services or goods. Search specifically in Schedule 1: The Services or Schedule A: The Services. Extract the verbatim content of that schedule including services, deliverables, service levels, milestones and key personnel. If no Schedule exists, extract verbatim from the clause that most specifically defines what is being provided. What are The Services?. examples: Services: Legal Services as requested by ASC. Key Personnel: duly qualified Personnel to be provided as required. Level 1-Level 4 eLearning content development including instructional design and multimedia production

field.scope_section_reference.keywords = section,article,clause,schedule,annex,exhibit

